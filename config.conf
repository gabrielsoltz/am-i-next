# am-i-next configuration
# Shell-sourced by am-i-next.sh — runtime knobs only.
#
# The list of locations to scan now lives in paths.json (a language-neutral
# manifest other tools can fetch too). This file holds only how-to-run settings.

# ---------------------------------------------------------------------------
# Trufflehog settings
# ---------------------------------------------------------------------------

# Path/command to trufflehog binary. Override if installed in a non-standard
# location (e.g. TRUFFLEHOG_BIN="/opt/homebrew/bin/trufflehog")
TRUFFLEHOG_BIN="trufflehog"

# Extra flags passed to every trufflehog invocation.
# --json         machine-readable output (parsed by this script)
#
# Anything you add here takes precedence over the derived default.
TRUFFLEHOG_EXTRA_ARGS=(
    "--json"
)

# Verify findings against the issuer's API (e.g. call AWS STS to confirm an
# AWS key is live). See README "Verification" section for trade-offs.
# Override at runtime with --no-verify to skip verification for one run.
VERIFY=true

# ---------------------------------------------------------------------------
# Scan behavior
# ---------------------------------------------------------------------------

# Path to the scan-location manifest. Defaults to paths.json next to this file.
# Point at a fetched copy (e.g. from the repo's raw URL) to scan against the
# upstream list without cloning.
MANIFEST_FILE="${SCRIPT_DIR:-.}/paths.json"

# Scan the entire home directory in one pass instead of the curated manifest.
# This mirrors what real harvesters (Shai-Hulud, s1ngularity) do — more thorough
# but much slower. When enabled, individual paths under $HOME are skipped as
# redundant; non-home paths (/tmp, /etc/*) are still scanned.
# Override at runtime with --full-home.
FULL_HOME_SCAN=false

# Directory where the timestamped scan report (scan-<date>.log) is written.
# A report is always produced; override the full path at runtime with --report.
# NOTE: reports can contain secret material — keep this dir out of version
# control (the repo's .gitignore already excludes scan-*.log).
REPORT_DIR="."
