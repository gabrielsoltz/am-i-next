# am-i-next configuration
# Shell-sourced by am-i-next.sh — bash array syntax required.
# Paths support ~ expansion. Non-existent paths are silently skipped.

# ---------------------------------------------------------------------------
# Trufflehog settings
# ---------------------------------------------------------------------------

# Path/command to trufflehog binary. Override if installed in a non-standard
# location (e.g. TRUFFLEHOG_BIN="/opt/homebrew/bin/trufflehog")
TRUFFLEHOG_BIN="trufflehog"

# Extra flags passed to every trufflehog invocation.
# --no-update        skip the self-update check
# --json             machine-readable output (parsed by this script)
# --results=verified only surface secrets trufflehog could verify as active
TRUFFLEHOG_EXTRA_ARGS=(
    "--no-update"
    "--json"
    "--results=verified"
)

# Scan the entire home directory in one pass instead of the curated list of
# paths below. This mirrors what real harvesters (Shai-Hulud, s1ngularity) do —
# more thorough but much slower. When enabled, individual paths under $HOME are
# skipped as redundant; non-home paths (/tmp, /etc/*) are still scanned.
# Override at runtime with --full-home.
FULL_HOME_SCAN=false

# Directory where the timestamped scan report (scan-<date>.log) is written.
# A report is always produced; override the full path at runtime with --report.
# NOTE: reports can contain secret material — keep this dir out of version
# control (the repo's .gitignore already excludes scan-*.log).
REPORT_DIR="."

# ---------------------------------------------------------------------------
# Scan locations — common (macOS + Linux)
# ---------------------------------------------------------------------------

COMMON_SCAN_LOCATIONS=(

    # Cloud credentials
    "$HOME/.aws"
    "$HOME/.azure"
    "$HOME/.config/gcloud"
    "$HOME/.oci"                        # Oracle Cloud

    # Container / orchestration
    "$HOME/.kube"
    "$HOME/.docker"
    "$HOME/.minikube"

    # SSH
    "$HOME/.ssh"

    # Git
    "$HOME/.gitconfig"
    "$HOME/.git-credentials"
    "$HOME/.config/gh"                  # GitHub CLI

    # Package managers / registries
    "$HOME/.npmrc"
    "$HOME/.pypirc"
    "$HOME/.gem/credentials"
    "$HOME/.cargo/credentials.toml"
    "$HOME/.gradle/gradle.properties"
    "$HOME/.m2/settings.xml"
    "$HOME/.nuget"

    # Infrastructure-as-code
    "$HOME/.terraformrc"
    "$HOME/.terraform.d/credentials.tfrc.json"
    "$HOME/.config/op"                  # 1Password CLI

    # VPN / network
    "$HOME/.netrc"
    "$HOME/.config/wireguard"

    # Secrets managers / Vault
    "$HOME/.vault-token"               # HashiCorp Vault token

    # AI tool credentials AND conversation history.
    "$HOME/.claude"                    # Claude Code: .credentials.json + projects/**/*.jsonl, history.jsonl, tasks/
    "$HOME/.codex"                     # OpenAI Codex CLI: state_5.sqlite, logs_2.sqlite
    "$HOME/.gemini"
    "$HOME/.codeium"                   # Codeium / Windsurf
    "$HOME/.cursor"
    "$HOME/.continue"                  # Continue.dev: config + session history
    "$HOME/.config"

    # Cryptocurrency wallets
    "$HOME/.ethereum"                  # Geth keystore (UTC--* key files)
    "$HOME/.electrum"
    "$HOME/.bitcoin"
    "$HOME/.monero"
    "$HOME/.config/solana"             # Solana CLI keypairs (id.json)
    "$HOME/.config/Exodus"
    "$HOME/.config/Electrum"
    "$HOME/.config/atomic"

    # GPG / signing
    "$HOME/.gnupg"

    # Shell history (secrets sometimes echo'd or exported inline)
    "$HOME/.bash_history"
    "$HOME/.zsh_history"
    "$HOME/.fish/fish_history"

    # Common project root locations
    "$HOME/code"
    "$HOME/projects"
    "$HOME/dev"
    "$HOME/workspace"
    "$HOME/src"

    # Temporary files
    "/tmp"
)

# ---------------------------------------------------------------------------
# Scan locations — macOS only
# ---------------------------------------------------------------------------

MACOS_SCAN_LOCATIONS=(
    # IDE settings
    "$HOME/Library/Application Support/Code/User"
    "$HOME/Library/Application Support/Cursor/User"
    "$HOME/Library/Application Support/JetBrains"
    "$HOME/Library/Application Support/GitHub Desktop"

    # Homebrew may cache formulae with tokens
    "$HOME/Library/Caches/Homebrew"

    # Cloud provider desktop apps
    "$HOME/Library/Application Support/AWS"

    # App preferences (some tools store tokens here)
    "$HOME/Library/Preferences"

    # macOS Keychain export artifacts (not the binary .keychain-db itself)
    "$HOME/Library/Keychains"

    # Containers data (Docker Desktop, Lima, etc.)
    "$HOME/Library/Containers"

    # Slack, Notion, and similar apps sometimes cache tokens locally
    "$HOME/Library/Application Support/Slack"

    # AI app history
    "$HOME/Library/Application Support/Claude"
    "$HOME/Library/Application Support/com.openai.chat"   # ChatGPT Desktop (conversations-v3-*/*.data)
    "$HOME/Library/Application Support/Windsurf/User"

    # Browser profiles — Local Storage / IndexedDB hold session tokens and
    # browser-extension wallet data (MetaMask, Phantom, etc.). Caches are
    # excluded via EXCLUDE_PATTERNS to keep scans fast.
    "$HOME/Library/Application Support/Google/Chrome"
    "$HOME/Library/Application Support/BraveSoftware/Brave-Browser"
    "$HOME/Library/Application Support/Microsoft Edge"
    "$HOME/Library/Application Support/Firefox"
    "$HOME/Library/Application Support/Arc"

    # Desktop cryptocurrency wallets
    "$HOME/Library/Application Support/Exodus"
    "$HOME/Library/Application Support/Electrum"
    "$HOME/Library/Application Support/Ledger Live"
    "$HOME/Library/Application Support/atomic"
)

# ---------------------------------------------------------------------------
# Scan locations — Linux only
# ---------------------------------------------------------------------------

LINUX_SCAN_LOCATIONS=(
    # IDE settings (incl. AI-assistant conversation history)
    "$HOME/.config/Code/User"
    "$HOME/.config/Cursor/User"
    "$HOME/.config/Windsurf/User"
    "$HOME/.config/JetBrains"

    # Broad XDG data dir — keyrings, browser data, wallet app data live here
    "$HOME/.local/share"

    # Browser profiles — Local Storage / IndexedDB hold session tokens and
    # browser-extension wallet data. Caches excluded via EXCLUDE_PATTERNS.
    "$HOME/.config/google-chrome"
    "$HOME/.config/chromium"
    "$HOME/.config/BraveSoftware"
    "$HOME/.config/microsoft-edge"
    "$HOME/.mozilla/firefox"

    # Snap-installed app data
    "$HOME/snap"

    # Flatpak app data
    "$HOME/.var/app"

    # System-level locations worth checking
    "/etc/environment"
    "/etc/profile.d"
)

# ---------------------------------------------------------------------------
# Exclusion patterns passed to trufflehog --exclude-paths
# Regex syntax (RE2). Separate entries with newlines; the script joins them.
# ---------------------------------------------------------------------------

EXCLUDE_PATTERNS=(
    "\.git/objects"         # git object store (binary, not useful)
    "\.git/pack"
    "node_modules"
    "__pycache__"
    # Browser cache dirs — large and worthless; the valuable data lives in
    # Local Storage / IndexedDB / Login Data, which are NOT excluded.
    "/Cache/"
    "/Code Cache/"
    "/GPUCache/"
    "/ShaderCache/"
    "/Service Worker/CacheStorage/"
    "/CacheStorage/"
    "cache2/entries"        # Firefox cache
    "\.pyc$"
    "\.class$"
    "\.so$"
    "\.dylib$"
    "\.dmg$"
    "\.pkg$"
    "\.iso$"
    "\.tar$"
    "\.gz$"
    "\.zip$"
    "\.jpg$"
    "\.jpeg$"
    "\.png$"
    "\.gif$"
    "\.mp4$"
    "\.mov$"
    "\.pdf$"
)
